<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hoster</title>

<style>
:root{
  --bg:#070A12;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --text:#EDEDF3;
  --muted:#9AA3B2;
  --border:rgba(255,255,255,0.10);
  --accent:#7C5CFF;
  --accent2:#22D3EE;
  --shadow: 0 20px 60px rgba(0,0,0,0.6);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui;
  background:
    radial-gradient(1000px 500px at 20% 10%, rgba(124,92,255,0.25), transparent),
    radial-gradient(800px 400px at 80% 20%, rgba(34,211,238,0.18), transparent),
    var(--bg);
  color:var(--text);
}

/* layout */
.app{
  display:grid;
  grid-template-columns:260px 1fr 320px;
  height:100vh;
}

/* sidebar */
.sidebar{
  padding:20px;
  border-right:1px solid var(--border);
  background:rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
}

.brand{
  font-size:20px;
  font-weight:800;
  margin-bottom:18px;
}

.navbtn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
  transition:.2s;
}

.navbtn:hover{
  transform:translateY(-1px);
  border-color:rgba(124,92,255,0.5);
}

.sectionTitle{
  margin:18px 0 8px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:0.12em;
}

/* main */
.main{
  padding:20px;
  overflow:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.title{
  font-size:22px;
  font-weight:800;
}

.actions button{
  margin-left:8px;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
}

/* editor */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.tabs{
  display:flex;
  gap:8px;
}

.tab{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  cursor:pointer;
}

.tab.active{
  background:rgba(124,92,255,0.25);
  border-color:rgba(124,92,255,0.6);
}

textarea{
  width:100%;
  height:220px;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  outline:none;
  resize:none;
  font-family:monospace;
}

.preview{
  margin-top:12px;
  height:320px;
  border-radius:18px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:var(--shadow);
}

iframe{
  width:100%;
  height:100%;
  border:none;
  background:white;
}

/* right panel */
.right{
  border-left:1px solid var(--border);
  padding:20px;
  background:rgba(0,0,0,0.2);
  backdrop-filter: blur(12px);
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

.small{
  color:var(--muted);
  font-size:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  margin-top:6px;
}

/* responsive */
@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .sidebar,.right{display:none}
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">Hoster</div>

    <div class="sectionTitle">NAV</div>
    <button class="navbtn">Dashboard</button>
    <button class="navbtn">Sites</button>
    <button class="navbtn">Deploy</button>

    <div class="sectionTitle">TOOLS</div>
    <button class="navbtn">Templates</button>
    <button class="navbtn">AI Builder</button>
    <button class="navbtn">Analytics</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div class="title">Website Editor</div>
      <div class="actions">
        <button onclick="save()">Save</button>
        <button class="primary" onclick="deploy()">Deploy</button>
      </div>
    </div>

    <div class="grid">

      <div class="tabs">
        <button class="tab active" onclick="tab('html')">HTML</button>
        <button class="tab" onclick="tab('css')">CSS</button>
        <button class="tab" onclick="tab('js')">JS</button>
      </div>

      <textarea id="html"></textarea>
      <textarea id="css" style="display:none"></textarea>
      <textarea id="js" style="display:none"></textarea>

      <div class="preview">
        <iframe id="preview"></iframe>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card">
      <div class="small">Site Name</div>
      <input id="name" placeholder="my-site" />
    </div>

    <div class="card">
      <div class="small">Deploy URL</div>
      <div id="url">not deployed</div>
    </div>

    <div class="card">
      <div class="small">Status</div>
      <div>Ready</div>
    </div>

  </div>

</div>

<script>

const html = document.getElementById("html");
const css = document.getElementById("css");
const js = document.getElementById("js");
const preview = document.getElementById("preview");

html.value = "<h1>Hello Hoster</h1>";
css.value = "body{font-family:Arial;text-align:center;padding:40px;}";
js.value = "";

function render(){
  preview.srcdoc = `
  <style>${css.value}</style>
  ${html.value}
  <script>${js.value}<\/script>
  `;
}

html.oninput = css.oninput = js.oninput = render;

function tab(t){
  html.style.display = t==="html"?"block":"none";
  css.style.display = t==="css"?"block":"none";
  js.style.display = t==="js"?"block":"none";
}

function save(){
  alert("Saved (demo)");
}

function deploy(){
  const name = document.getElementById("name").value || "site";
  document.getElementById("url").innerText =
    `https://hoster-cc84.onrender.com/view/${name}`;
  alert("Deployed!");
}

render();

</script>

</body>
</html>
